server {
    listen 80 default_server;
    server_name intranet.hofstetterlab.ovh;

    root /var/www/public;
    index index.html index.php;
    charset utf-8;

    # — Assets statiques —
    location ~* ^/build/assets/.*\.(css|js|jpg|jpeg|gif|png|ico|svg|woff2?|ttf|eot|otf|json)$ {
        try_files $uri =404;
        expires max;
        access_log off;
    }

    # — Toutes les autres routes vers Laravel/React —
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # — PHP via FPM —
    location ~ \.php$ {
        fastcgi_pass intranet-app:9000;
        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        include fastcgi_params;

        # script à exécuter
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Indiquer à Laravel qu'on est sous HTTPS derrière un proxy
        # 1) Cloudflare / ton client ajoute X-Forwarded-Proto
        # 2) On transmet cet en-tête à PHP
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;

        # Optionnel : forcer HTTPS pour PHP sans dépendre de X-Forwarded-*
        fastcgi_param HTTPS                  on;
    }

    # — Sécurité —
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        no-referrer-when-downgrade;
    add_header Content-Security-Policy "upgrade-insecure-requests" always;
}
