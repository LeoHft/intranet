server {
    listen 80 default_server;
    server_name intranet.hofstetterlab.ovh;

    root /var/www/public;
    index index.html index.php;
    charset utf-8;

    # Static assets (relative paths, pas besoin de CORS si même origine)
    location ~* ^/build/assets/.*\.(css|js|jpg|jpeg|gif|png|ico|svg|woff2?|ttf|eot|otf|json)$ {
        try_files $uri =404;
        expires max;
        access_log off;
    }

    # Laravel + React routes
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass intranet-app:9000;
        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        include fastcgi_params;

        # Chemin du script
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Transmettre l’hôte et le protocole pour que Laravel sache qu’il est derrière HTTPS
        fastcgi_param HTTP_HOST              $host;
        fastcgi_param HTTPS                  $scheme;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
    }

    # En-têtes de sécurité
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        no-referrer-when-downgrade;
    add_header Content-Security-Policy "upgrade-insecure-requests" always;
}
